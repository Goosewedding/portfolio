<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

  <main class="login-page">
    <div class="login-card">

300H125H225V285V270H125H25V285Z" fill="#FCFCFC"/></g><defs><clipPath id="clip0_login_mac"><rect width="241" height="310" fill="white"/></clipPath></defs></svg>
        <h1 class="login-card__title" style="margin-bottom:0;">Log In</h1>
      </div>
      <p class="login-card__subtitle">Style guide &amp; editor access</p>

      <form class="login-card__form" id="loginForm" novalidate>

        <div class="form-field">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            autocomplete="current-password"
            autofocus
          >
        </div>

        <p class="login-card__error" id="loginError">Incorrect password. Try again.</p>

        <div style="display:flex; align-items:center; gap:var(--space-4);">
          <a href="index.html" class="btn--text"><svg width="1em" height="1em" viewBox="0 0 11 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M5.86667 0.701768V1.05265H5.5H5.13333V1.40352V1.7544H4.76667H4.4V2.10528V2.45615H4.03333H3.66667V2.80703V3.15791H3.3H2.93333V3.50879V3.85966H2.56667H2.2V4.21054V4.56142H1.83333H1.46667V4.91229V5.26317H1.1H0.733333V5.61405V5.96493H0.366667H0V6.3158V6.66668H0.366667H0.733333V7.01756V7.36844H1.1H1.46667V7.71931V8.07019H1.83333H2.2V8.42107V8.77194H2.56667H2.93333V9.12282V9.4737H3.3H3.66667V9.82458V10.1755H4.03333H4.4V10.5263V10.8772H4.76667H5.13333V11.2281V11.579H5.5C5.85853 11.579 5.86667 11.5837 5.86667 11.7895C5.86667 11.9953 5.87481 12 6.23333 12H6.6V10.386V8.77194H8.79179H10.9836L11.0115 7.49124C11.0268 6.78689 11.0267 5.68163 11.0112 5.0351L10.9831 3.85966H8.79157H6.6V2.10528V0.350891H6.23333H5.86667V0.701768Z" fill="currentColor"/></svg>Back</a>
          <button class="btn--primary" type="submit">Enter</button>
        </div>

      </form>

    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    // If already logged in, skip login
    if (Auth.isLoggedIn()) {
      window.location.href = 'styleguide.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const error    = document.getElementById('loginError');

      if (Auth.login(password)) {
        window.location.href = 'styleguide.html';
      } else {
        error.classList.add('visible');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>

</body>
</html>
