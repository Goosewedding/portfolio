<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #contact-image-stack #cb-content { margin-top: 0; }
    #contact-image-stack #cb-content > .cb-block:first-child { margin-top: 0; padding-top: 0; }
    #contact-image-stack { outline: 1px solid #ffffff; }
    #contact-text-below .cb-block { padding: var(--space-4); }
    #contact-text-below { margin-top: var(--space-8); display: flex; flex-direction: column; gap: var(--space-4); }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="site-nav__left">
      <a href="index.html" class="btn--secondary">
        <svg width="1em" height="1em" viewBox="0 0 16 19" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 18.9095H0V0.000366211H16V18.9095ZM1.4541 17.4545H13.0908V16.0004H1.4541V17.4545ZM1.4541 14.5453H13.0908V1.45447H1.4541V14.5453ZM4.36328 13.0912H2.90918V11.6361H4.36328V13.0912ZM11.6357 13.0912H7.27246V11.6361H11.6357V13.0912ZM11.6357 10.182H2.90918V2.90955H11.6357V10.182Z" fill="currentColor"/>
        </svg>
      </a>
      <a href="portfolio.html" class="btn--secondary">Portfolio</a>
      <a href="https://nilekronerarchive.tumblr.com/" class="btn--secondary" target="_blank" rel="noopener">Blog</a>
      <a href="contact.html" class="btn--secondary">Contact</a>
    </div>
    <div class="site-nav__right">
      <a href="login.html" class="btn--secondary" id="nav-admin-link">Admin Login</a>
    </div>
  </nav>

  <div class="page-content page-content--wide page-top">
    <h1 class="heading-xl" style="color:#000000;">Contact</h1>
  </div>

  <div class="page-content page-content--wide" style="display:flex; justify-content:center; margin-top:var(--space-4);">
    <div id="contact-image-stack" style="display:inline-flex; flex-direction:column;">
      <img id="contact-header-svg" src="humanheader.svg" alt="" style="width:100%; display:block; pointer-events:none;">
      <div id="cb-content"></div>
    </div>
  </div>

  <div id="contact-text-below" style="margin-left:auto; margin-right:auto; margin-bottom:64px;"></div>

  <script src="js/published-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/folders.js"></script>
  <script src="js/content-builder.js"></script>
  <script>
    window.addEventListener('load', function () {
      const stack = document.getElementById('contact-image-stack');

      function separateTextBlocks() {
        const textBelow = document.getElementById('contact-text-below');
        const textBlocks = Array.from(document.querySelectorAll('#cb-content > .cb-block:not(.cb-block--image)'));
        textBlocks.forEach(block => textBelow.appendChild(block));
      }

      function syncWidths() {
        const imageBlock = document.querySelector('#cb-content .cb-block--image');
        if (!imageBlock) return;
        const w = imageBlock.offsetWidth;
        if (stack) stack.style.width = w + 'px';
        const textBelow = document.getElementById('contact-text-below');
        if (textBelow) { textBelow.style.width = w + 'px'; textBelow.style.maxWidth = w + 'px'; }
      }

      function addPhoneReveal() {
        const textBelow = document.getElementById('contact-text-below');
        if (!textBelow) return;
        const target = Array.from(textBelow.querySelectorAll('.cb-block')).find(b => b.textContent.includes('spammer'));
        if (!target) return;
        const btn = document.createElement('button');
        btn.className = 'btn--secondary';
        btn.style.cssText = 'margin-top:var(--space-4); display:block; background-color:var(--color-gray-200);';
        btn.textContent = 'Phone Number';
        btn.addEventListener('mouseenter', () => { btn.textContent = '515-494-2772'; btn.style.backgroundColor = '#000000'; btn.style.color = '#ffffff'; });
        btn.addEventListener('mouseleave', () => { btn.textContent = 'Phone Number'; btn.style.backgroundColor = 'var(--color-gray-200)'; btn.style.color = ''; });
        target.appendChild(btn);
      }

      separateTextBlocks();
      addPhoneReveal();
      syncWidths();
      window.addEventListener('resize', syncWidths);

      const imageBlock = document.querySelector('#cb-content .cb-block--image');
      if (imageBlock) new ResizeObserver(syncWidths).observe(imageBlock);
    });
  </script>
</body>
</html>
